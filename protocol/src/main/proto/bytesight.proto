syntax = "proto3";

package bytesight;

option java_package = "com.bugdigger.protocol";
option java_outer_classname = "BytesightProto";
option java_multiple_files = true;

// ============================================================================
// Main Bytesight Agent Service
// ============================================================================

service BytesightAgent {
    // Connection & Status
    rpc GetAgentInfo(GetAgentInfoRequest) returns (AgentInfo);
    rpc Ping(PingRequest) returns (PingResponse);

    // Class Operations
    rpc GetLoadedClasses(GetClassesRequest) returns (stream ClassInfo);
    rpc GetClassBytecode(GetBytecodeRequest) returns (BytecodeResponse);
    rpc SubscribeClassLoading(SubscribeRequest) returns (stream ClassLoadEvent);

    // Hook Management
    rpc AddHook(AddHookRequest) returns (HookResponse);
    rpc RemoveHook(RemoveHookRequest) returns (HookResponse);
    rpc ListHooks(ListHooksRequest) returns (ListHooksResponse);

    // Method Tracing
    rpc StartTracing(StartTracingRequest) returns (TracingResponse);
    rpc StopTracing(StopTracingRequest) returns (TracingResponse);
    rpc SubscribeMethodTraces(SubscribeRequest) returns (stream MethodTraceEvent);

    // Heap Inspection
    rpc CaptureHeapSnapshot(CaptureHeapSnapshotRequest) returns (HeapSnapshotInfo);
    rpc GetClassHistogram(GetClassHistogramRequest) returns (stream ClassHistogramEntry);
    rpc ListInstances(ListInstancesRequest) returns (stream InstanceSummary);
    rpc GetObject(GetObjectRequest) returns (ObjectDetail);
    rpc SearchValues(SearchValuesRequest) returns (stream ValueMatch);
    rpc FindDuplicateStrings(FindDuplicateStringsRequest) returns (stream DuplicateStringGroup);

    // Debugger
    rpc SetBreakpoint(SetBreakpointRequest) returns (BreakpointResponse);
    rpc RemoveBreakpoint(RemoveBreakpointRequest) returns (BreakpointResponse);
    rpc ListBreakpoints(ListBreakpointsRequest) returns (ListBreakpointsResponse);
    rpc SubscribeDebuggerEvents(SubscribeRequest) returns (stream DebuggerEvent);
    rpc Resume(ResumeRequest) returns (ResumeResponse);
    rpc Pause(PauseRequest) returns (PauseResponse);
}

// ============================================================================
// Connection & Status Messages
// ============================================================================

message GetAgentInfoRequest {}

message AgentInfo {
    string agent_version = 1;
    string target_jvm_version = 2;
    string target_jvm_vendor = 3;
    string target_main_class = 4;
    int64 target_pid = 5;
    int64 start_time = 6;
    int32 grpc_port = 7;
}

message PingRequest {}

message PingResponse {
    int64 timestamp = 1;
}

// ============================================================================
// Class Messages
// ============================================================================

message GetClassesRequest {
    string package_filter = 1;      // Optional: filter by package prefix
    bool include_system = 2;        // Include java.*, javax.*, sun.* classes
}

message ClassInfo {
    string name = 1;                // Fully qualified name (e.g., "com.example.MyClass")
    string package_name = 2;        // Package (e.g., "com.example")
    string simple_name = 3;         // Simple name (e.g., "MyClass")
    string superclass = 4;          // Superclass name
    repeated string interfaces = 5; // Implemented interfaces
    int32 modifiers = 6;            // Java modifiers (public, final, etc.)
    bool is_interface = 7;
    bool is_enum = 8;
    bool is_annotation = 9;
    bool is_synthetic = 10;
    int64 loaded_at = 11;           // Timestamp when class was loaded
    string class_loader = 12;       // Class loader name
    repeated MethodInfo methods = 13;
    repeated FieldInfo fields = 14;
}

message MethodInfo {
    string name = 1;
    string signature = 2;           // JVM signature (e.g., "(Ljava/lang/String;)V")
    string return_type = 3;
    repeated string parameter_types = 4;
    int32 modifiers = 5;
    bool is_synthetic = 6;
    bool is_bridge = 7;
}

message FieldInfo {
    string name = 1;
    string type = 2;
    int32 modifiers = 3;
    bool is_synthetic = 4;
}

message GetBytecodeRequest {
    string class_name = 1;          // Fully qualified class name
}

message BytecodeResponse {
    string class_name = 1;
    bytes bytecode = 2;             // Raw class file bytes
    bool found = 3;
    string error = 4;               // Error message if not found
}

message SubscribeRequest {
    string filter = 1;              // Optional filter pattern
}

message ClassLoadEvent {
    ClassInfo class_info = 1;
    int64 timestamp = 2;
    EventType event_type = 3;

    enum EventType {
        LOADED = 0;
        TRANSFORMED = 1;
        REDEFINED = 2;
    }
}

// ============================================================================
// Hook Messages
// ============================================================================

message AddHookRequest {
    string id = 1;                  // Client-provided hook ID
    string class_name = 2;          // Target class
    string method_name = 3;         // Target method
    string method_signature = 4;    // Optional: specific overload
    HookType hook_type = 5;
    HookConfig config = 6;
}

enum HookType {
    LOG_ENTRY_EXIT = 0;             // Log method entry and exit
    LOG_ARGUMENTS = 1;              // Log method arguments
    LOG_RETURN_VALUE = 2;           // Log return value
    MODIFY_RETURN = 3;              // Modify the return value
    SKIP_EXECUTION = 4;             // Skip method execution entirely
    CUSTOM = 5;                     // Custom hook logic
}

message HookConfig {
    // For MODIFY_RETURN
    string return_value = 1;        // JSON representation of return value

    // For logging hooks
    bool include_stack_trace = 2;
    bool include_timestamp = 3;

    // General
    int32 max_depth = 4;            // Max object depth for logging
}

message HookResponse {
    bool success = 1;
    string hook_id = 2;
    string error = 3;
}

message RemoveHookRequest {
    string hook_id = 1;
}

message ListHooksRequest {}

message ListHooksResponse {
    repeated HookInfo hooks = 1;
}

message HookInfo {
    string id = 1;
    string class_name = 2;
    string method_name = 3;
    string method_signature = 4;
    HookType hook_type = 5;
    bool active = 6;
    int64 hit_count = 7;
    int64 created_at = 8;
}

// ============================================================================
// Tracing Messages
// ============================================================================

message StartTracingRequest {
    string class_filter = 1;        // Class name pattern to trace
    string method_filter = 2;       // Method name pattern to trace
    bool trace_arguments = 3;
    bool trace_return_values = 4;
    bool trace_exceptions = 5;
    bool trace_timing = 6;
}

message StopTracingRequest {
    string trace_id = 1;
}

message TracingResponse {
    bool success = 1;
    string trace_id = 2;
    string error = 3;
}

message MethodTraceEvent {
    string trace_id = 1;
    int64 timestamp = 2;
    int64 thread_id = 3;
    string thread_name = 4;

    string class_name = 5;
    string method_name = 6;
    string method_signature = 7;

    TraceEventType event_type = 8;

    // For ENTRY events
    repeated ArgumentValue arguments = 9;

    // For EXIT events
    ArgumentValue return_value = 10;
    int64 duration_nanos = 11;

    // For EXCEPTION events
    string exception_class = 12;
    string exception_message = 13;
    string stack_trace = 14;

    // Call hierarchy
    int32 depth = 15;               // Call stack depth
    string parent_call_id = 16;     // Parent method call ID
    string call_id = 17;            // Unique ID for this call

    enum TraceEventType {
        ENTRY = 0;
        EXIT = 1;
        EXCEPTION = 2;
    }
}

message ArgumentValue {
    string name = 1;                // Parameter name (if available)
    string type = 2;                // Type name
    string value = 3;               // String representation
    bool is_null = 4;
    bool truncated = 5;             // True if value was truncated
}

// ============================================================================
// Heap Inspection Messages
// ============================================================================

message CaptureHeapSnapshotRequest {}

message HeapSnapshotInfo {
    int64 snapshot_id = 1;
    int64 object_count = 2;
    int64 total_shallow_bytes = 3;
    int64 captured_at_millis = 4;
    bool available = 5;             // False if the native heap library failed to load
    string error = 6;               // Populated when available=false
}

message GetClassHistogramRequest {
    int64 snapshot_id = 1;
    string name_filter = 2;         // Empty = all; matches fully-qualified class names (contains)
}

message ClassHistogramEntry {
    string class_name = 1;
    int64 instance_count = 2;
    int64 shallow_bytes = 3;
}

message ListInstancesRequest {
    int64 snapshot_id = 1;
    string class_name = 2;          // Exact, fully-qualified class name
    int32 limit = 3;                // 0 or negative means no limit
}

message InstanceSummary {
    int64 tag = 1;
    string class_name = 2;
    int64 shallow_bytes = 3;
    string preview = 4;             // Short, side-effect-free preview (e.g. String value, "Class@tag")
}

message GetObjectRequest {
    int64 snapshot_id = 1;
    int64 tag = 2;
}

message ObjectDetail {
    int64 tag = 1;
    string class_name = 2;
    int64 shallow_bytes = 3;
    bool found = 4;                 // False if the tag is unknown or the object is gone
    string error = 5;
    repeated FieldValue fields = 6;
    repeated ReferenceEdge outgoing_refs = 7;
}

message FieldValue {
    string name = 1;
    string declared_type = 2;       // Java name (e.g. "java.lang.String", "int", "byte[]")
    FieldKind kind = 3;
    int64 int_value = 4;            // byte/short/int/long/char/bool via widening
    double double_value = 5;        // float/double
    string string_value = 6;        // For strings + toString-free previews
    int64 ref_tag = 7;              // 0 means null
    bool is_static = 8;
    bool is_null = 9;
}

enum FieldKind {
    FIELD_KIND_UNSPECIFIED = 0;
    FIELD_KIND_INT = 1;             // byte/short/int/long/char/bool
    FIELD_KIND_DOUBLE = 2;          // float/double
    FIELD_KIND_STRING = 3;
    FIELD_KIND_REF = 4;
    FIELD_KIND_NULL = 5;
}

message ReferenceEdge {
    string field_name = 1;          // Name of the field holding the reference (or "[idx]" for arrays)
    int64 target_tag = 2;
    string target_class_name = 3;
}

// ============================================================================
// Value Search
// ============================================================================

message SearchValuesRequest {
    int64 snapshot_id = 1;
    string string_contains = 2;     // Substring match against String values (empty = unused)
    string field_class_name = 3;    // For field-equals mode: fully-qualified class name
    string field_name = 4;          // For field-equals mode: field name
    string field_value = 5;         // For field-equals mode: value as string (agent parses per type)
    int32 limit = 6;                // Max results (0 = default 500)
}

message ValueMatch {
    int64 tag = 1;
    string class_name = 2;
    string matched_field = 3;       // Empty for string substring match
    string matched_value = 4;       // The actual value that matched (truncated)
}

// ============================================================================
// Duplicate Strings
// ============================================================================

message FindDuplicateStringsRequest {
    int64 snapshot_id = 1;
    int32 min_count = 2;            // Minimum duplication count (default 2)
    int32 min_length = 3;           // Skip trivially short strings
    int32 limit_groups = 4;         // Max groups to return (0 = default 100)
}

message DuplicateStringGroup {
    string value = 1;               // The duplicated string content (truncated to 200 chars)
    int32 count = 2;
    int64 wasted_bytes = 3;         // (count - 1) * shallow_size
    repeated int64 example_tags = 4; // Up to N sample tags for drill-down
}

// ============================================================================
// Debugger Messages
// ============================================================================

message Breakpoint {
    string id = 1;
    oneof location {
        LineLocation line = 2;
        MethodLocation method = 3;
    }
    bool enabled = 10;
    // reserved 11-20 for Phase 2 (condition, hit_count, thread_filter, log_only, log_format)
}

message LineLocation {
    string class_name = 1;
    int32 line_number = 2;
}

message MethodLocation {
    string class_name = 1;
    string method_name = 2;
    string method_signature = 3;    // Optional: specific overload
    MethodBreakpointMode mode = 4;
}

enum MethodBreakpointMode {
    METHOD_BP_ENTRY = 0;
    METHOD_BP_EXIT = 1;
    METHOD_BP_BOTH = 2;
}

message SetBreakpointRequest {
    Breakpoint breakpoint = 1;
}

message RemoveBreakpointRequest {
    string breakpoint_id = 1;
}

message BreakpointResponse {
    bool success = 1;
    string breakpoint_id = 2;
    string error = 3;
}

message ListBreakpointsRequest {}

message ListBreakpointsResponse {
    repeated Breakpoint breakpoints = 1;
}

message ResumeRequest {
    int64 thread_id = 1;            // 0 means resume all suspended threads
}

message ResumeResponse {
    bool success = 1;
    int32 resumed_count = 2;
    string error = 3;
}

message PauseRequest {
    int64 thread_id = 1;            // 0 means pause all threads at next safe point
}

message PauseResponse {
    bool success = 1;
    int32 paused_count = 2;
    string error = 3;
}

message DebuggerEvent {
    int64 sequence_id = 1;          // Monotonic — keystone for future time-travel replay
    int64 timestamp_ns = 2;
    oneof kind {
        BreakpointHit hit = 10;
        ThreadStateChanged thread = 11;
        // reserved 12-19 for Phase 2+ (StepCompleted, ExceptionThrown, ...)
    }
}

message BreakpointHit {
    string breakpoint_id = 1;
    int64 thread_id = 2;
    string thread_name = 3;
    FrameSnapshot top_frame = 4;
    repeated FrameSnapshot stack = 5;
    // reserved 6-9 for Phase 2+ (locks_held, full_locals, ...)
}

message ThreadStateChanged {
    int64 thread_id = 1;
    string thread_name = 2;
    ThreadState state = 3;
}

enum ThreadState {
    THREAD_STATE_UNKNOWN = 0;
    THREAD_STATE_RUNNING = 1;
    THREAD_STATE_SUSPENDED = 2;
    THREAD_STATE_WAITING = 3;
    THREAD_STATE_BLOCKED = 4;
    THREAD_STATE_TERMINATED = 5;
}

message FrameSnapshot {
    string class_name = 1;
    string method_name = 2;
    string signature = 3;
    int32 bytecode_offset = 4;
    int32 line_number = 5;
    repeated Variable arguments = 6;
    repeated Variable this_fields = 7;
    // reserved 8 for Phase 3 (locals)
}

message Variable {
    string name = 1;
    string type_name = 2;
    string display_value = 3;       // Human-readable string rendering
    int64 heap_tag = 4;             // 0 if primitive; otherwise resolvable via GetObject
    bool is_null = 5;
}
